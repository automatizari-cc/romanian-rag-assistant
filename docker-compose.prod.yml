# Production override for AMD CPU hosts (Hetzner CPX62 etc).
#
# Why this file exists:
# - bge-reranker-v2-m3 has no ONNX export, so TEI loads it via Candle + Intel
#   MKL. MKL's SGEMM segfaults on AMD CPUs (Parameter 13 to SGEMM). We replace
#   tei-rerank with tei-shim/ (FastAPI + sentence-transformers, pure PyTorch,
#   no MKL).
# - tei-embed stays on the real TEI cpu-1.7 image because bge-m3 has ONNX and
#   TEI uses ONNX Runtime there — no MKL involvement.
# - The cpu-1.7 image is distroless: no shell, no wget. Disable its healthcheck
#   and drop ingestion's depends_on for tei-embed from service_healthy to
#   service_started. tei-embed warms in ~30s on EPYC, well before first user
#   request, so the looser dependency is safe.
#
# Usage on prod:
#   docker compose -f docker-compose.yml -f docker-compose.prod.yml --profile prod up -d

services:

  tei-embed:
    healthcheck:
      disable: true

  tei-rerank:
    image: tei-shim:latest
    build:
      context: ./tei-shim
    command: ["uvicorn", "app:app", "--host", "0.0.0.0", "--port", "80", "--workers", "1"]
    environment:
      MODE: rerank
      MODEL_ID: ${RERANK_MODEL}
      # HF Hub xet protocol can stall mid-download with no progress logs and no
      # retries. Force the legacy direct-download path with a hard timeout.
      HF_HUB_DISABLE_XET: "1"
      HF_HUB_DOWNLOAD_TIMEOUT: "60"
      HF_HUB_ENABLE_HF_TRANSFER: "0"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys;sys.exit(0 if urllib.request.urlopen('http://127.0.0.1/health').status==200 else 1)\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 600s

  ingestion:
    depends_on: !override
      qdrant:
        condition: service_healthy
      tei-embed:
        condition: service_started
      tei-rerank:
        condition: service_healthy
      ollama:
        condition: service_healthy
