version: 2
updates:

  - package-ecosystem: pip
    directory: /ingestion
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      python-runtime:
        patterns: ["*"]

  - package-ecosystem: docker
    directory: /ingestion
    schedule:
      interval: weekly
      day: monday

  # NOTE: Dependabot's "docker" ecosystem reads Dockerfiles, not docker-compose.yml,
  # so no root-level entry. Compose images (qdrant, ollama, postgres, nginx, tei,
  # open-webui) are pinned by tag and bumped manually for now.

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
