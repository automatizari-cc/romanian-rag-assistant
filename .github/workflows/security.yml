name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: "23 4 * * 1"  # weekly Monday 04:23 UTC — catch new CVEs
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  pull-requests: read

concurrency:
  group: security-${{ github.ref }}
  cancel-in-progress: true

jobs:

  gitleaks:
    name: gitleaks (secrets)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  python-lint:
    name: ruff + bandit
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff==0.8.4 bandit[toml]==1.8.0
      - name: ruff
        run: ruff check ingestion/
      - name: bandit
        run: bandit -r ingestion/app -ll -ii

  pip-audit:
    name: pip-audit (deps CVEs)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install pip-audit==2.7.3
      - run: pip-audit --requirement ingestion/requirements.txt --strict

  hadolint:
    name: hadolint (Dockerfiles)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: ingestion/Dockerfile
          failure-threshold: warning
          # DL3008/DL3009: pinning apt package versions on debian-slim is impractical
          # (versions move with point releases); we accept the rolling update model.
          ignore: DL3008,DL3009

  trivy-fs:
    name: trivy fs (vulns + secrets)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          severity: HIGH,CRITICAL
          exit-code: "1"
          ignore-unfixed: true
          format: sarif
          output: trivy-fs.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-fs.sarif
          category: trivy-fs

  trivy-config:
    name: trivy config (compose + nginx)
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: aquasecurity/trivy-action@master
        with:
          scan-type: config
          scan-ref: .
          severity: HIGH,CRITICAL
          exit-code: "1"
          format: sarif
          output: trivy-config.sarif
      - uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-config.sarif
          category: trivy-config

  semgrep:
    name: semgrep (SAST)
    runs-on: ubuntu-24.04
    container:
      image: semgrep/semgrep
    steps:
      - uses: actions/checkout@v4
      # semgrep ci already exits non-zero on findings; --error was removed in newer versions
      - run: semgrep ci --config p/python --config p/security-audit --config p/owasp-top-ten --config p/dockerfile
        env:
          SEMGREP_RULES: p/python p/security-audit p/owasp-top-ten p/dockerfile
