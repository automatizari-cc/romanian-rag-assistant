user  nginx;
worker_processes  auto;

error_log  /var/log/nginx/error.log  warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" cf="$http_cf_connecting_ip"';

    access_log  /var/log/nginx/access.log  main;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;
    client_max_body_size  100m;

    # Security headers (origin-side; Cloudflare may layer more)
    map $sent_http_content_type $csp_header {
        default "default-src 'self'; img-src 'self' data: blob:; style-src 'self' 'unsafe-inline'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; connect-src 'self'; frame-ancestors 'none';";
    }

    # Mitigate H2C smuggling: only allow `Upgrade: websocket` to be forwarded.
    # Any other upgrade attempt (notably h2c) is silently stripped.
    map $http_upgrade $safe_upgrade {
        default     '';
        websocket   $http_upgrade;
    }
    map $http_upgrade $safe_connection {
        default     '';
        websocket   'upgrade';
    }

    # Auth-aware routing for "/": authenticated users (token cookie present)
    # are forwarded to Open-WebUI; everyone else sees the static landing page.
    # Cookie content is opaque here — Open-WebUI does the real auth check.
    map $cookie_token $root_dest {
        default     "/__landing";
        "~.+"       "/__webui_root";
    }

    # Static includes (no env substitution)
    include /etc/nginx/conf.d/*.conf;

    # Templated includes (rendered by nginx image's docker-entrypoint scripts
    # from /etc/nginx/templates/*.template at container startup).
    include /etc/nginx/dynamic-conf.d/*.conf;
}
