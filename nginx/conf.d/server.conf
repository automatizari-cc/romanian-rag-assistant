# HTTP → HTTPS redirect (Cloudflare hits 443 with Full Strict; this is for direct/legacy)
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name _;

    # ─── TLS (Let's Encrypt via DNS-01) ─────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Cloudflare Authenticated Origin Pulls (mTLS) ───────────────────────
    # Reject any client that doesn't present Cloudflare's origin-pull cert.
    # CA bundle is fetched by scripts/setup-origin-pulls.sh.
    ssl_client_certificate /etc/nginx/cf-origin-pull-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   $csp_header always;

    # ─── Proxy to Open-WebUI ────────────────────────────────────────────────
    location / {
        proxy_pass         http://open-webui:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Block hidden files just in case anything is mounted by mistake
    location ~ /\.(?!well-known) { deny all; }
}
