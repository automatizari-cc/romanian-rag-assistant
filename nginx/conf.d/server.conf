# Per-IP rate limit for the auth endpoint — defense in depth on top of
# Cloudflare's edge rate limit and the FastAPI per-IP limiter.
limit_req_zone $binary_remote_addr zone=auth_zone:10m rate=10r/m;

# HTTP → HTTPS redirect (Cloudflare hits 443 with Full Strict; this is for direct/legacy)
server {
    listen 80 default_server;
    server_name _;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2 default_server;
    server_name _;

    # ─── TLS (Let's Encrypt via DNS-01) ─────────────────────────────────────
    ssl_certificate     /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5:!3DES:!RC4;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;

    # ─── Cloudflare Authenticated Origin Pulls (mTLS) ───────────────────────
    # Reject any client that doesn't present Cloudflare's origin-pull cert.
    # CA bundle is fetched by scripts/setup-origin-pulls.sh.
    ssl_client_certificate /etc/nginx/cf-origin-pull-ca.pem;
    ssl_verify_client on;
    ssl_verify_depth 2;

    # ─── Security headers ───────────────────────────────────────────────────
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Content-Type-Options    "nosniff" always;
    add_header X-Frame-Options           "DENY" always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy   $csp_header always;

    # Default body cap (overridden tighter for auth below)
    client_max_body_size 100m;

    root /usr/share/nginx/html;

    # ─── Static landing + login ─────────────────────────────────────────────
    location = / {
        try_files /index.html =404;
    }

    location = /login {
        try_files /login.html =404;
    }

    location ^~ /static/ {
        try_files $uri =404;
        access_log off;
        expires 1h;
        add_header Cache-Control "public, max-age=3600" always;
    }

    # ─── Custom auth endpoint (FastAPI ingestion) ───────────────────────────
    # Tight body cap, nginx-level rate limit, no buffering for streaming.
    location = /auth/login {
        limit_req zone=auth_zone burst=5 nodelay;
        client_max_body_size 1k;
        proxy_pass         http://ingestion:8000/auth/login;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   CF-Connecting-IP  $http_cf_connecting_ip;
        proxy_read_timeout 30s;
    }

    # ─── Block direct browser access to Open-WebUI's own login page ─────────
    # Forces all auth through our validated /auth/login path. The Open-WebUI
    # signin API (/api/v1/auths/signin) is only reachable from inside the
    # docker network — our FastAPI proxy speaks to it on the internal network.
    location = /auth { return 302 /login; }
    location = /auth/ { return 302 /login; }

    location = /api/v1/auths/signin {
        return 403;
    }
    location = /api/v1/auths/signup {
        return 403;
    }

    # ─── Catch-all → Open-WebUI ─────────────────────────────────────────────
    location / {
        proxy_pass         http://open-webui:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto https;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Block hidden files just in case anything is mounted by mistake
    location ~ /\.(?!well-known) { deny all; }
}
